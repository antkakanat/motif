<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Motif — Offline</title>
    <style>
      :root {
        --color-bg: #0F0E1A;
        --color-surface: #161524;
        --color-primary: #5B4ED6;
        --color-text: #F4F4F7;
        --color-text-secondary: #9494A3;
      }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: var(--color-bg);
        color: var(--color-text);
        display: flex;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .card {
        max-width: 400px;
        width: 100%;
        padding: 40px;
        background: var(--color-surface);
        border-radius: 24px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      .logo {
        width: 64px;
        height: 64px;
        margin: 0 auto 24px;
        background: var(--color-primary);
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
        box-shadow: 0 10px 20px rgba(91, 78, 214, 0.3);
      }
      .logo img {
        width: 40px;
        height: 40px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 24px;
        font-weight: 700;
        letter-spacing: -0.02em;
      }
      p {
        margin: 0 0 24px;
        font-size: 15px;
        line-height: 1.6;
        color: var(--color-text-secondary);
      }
      .btn {
        display: inline-block;
        padding: 12px 24px;
        background: var(--color-primary);
        color: white;
        text-decoration: none;
        border-radius: 12px;
        font-weight: 600;
        font-size: 14px;
        transition: transform 0.2s ease, filter 0.2s ease;
      }
      .btn:hover {
        transform: translateY(-2px);
        filter: brightness(1.1);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo">
        <img src="/logo-light.png" alt="Motif">
      </div>
      <h1>You're offline</h1>
      <p>Motif works offline — your captures are safe. Go back to the app and your data will be there.</p>
      <a href="/" class="btn">Open Motif →</a>
    </div>
  </body>
</html>
