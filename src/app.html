<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#5B4ED6" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="Motif" />
		
		<!-- SEO Meta Tags -->
		<title>Motif - Capture every note, link, and quote privately.</title>
		<meta name="description" content="No cloud. No subscription. No tracking. Just your private links, quotes, notes, and images - 100% offline and secured with AES-256 local database encryption." />
		<meta name="keywords" content="private notes, bookmark manager, offline note taking, secure notes, secure database, local ocr, semantic search, PWA" />
		
		<!-- OpenGraph Meta Tags -->
		<meta property="og:title" content="Motif - Secure, Offline Personal Space" />
		<meta property="og:description" content="A gorgeous, fast, and 100% private spatial workspace for your notes, links, quotes, and images. Zero cloud dependencies, zero subscription fees." />
		<meta property="og:type" content="website" />
		<meta property="og:image" content="/screenshots/desktop.png" />
		<meta property="og:site_name" content="Motif" />
		
		<!-- Twitter Cards Meta Tags -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Motif - Secure, Offline Personal Space" />
		<meta name="twitter:description" content="A gorgeous, fast, and 100% private spatial workspace for your notes, links, quotes, and images. Zero cloud, zero subscription." />
		<meta name="twitter:image" content="/screenshots/desktop.png" />

		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		<link rel="canonical" href="https://motif.byant.dev/" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
